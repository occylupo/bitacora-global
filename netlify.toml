# Sitio 100% estático: sin build, se publica la raíz tal cual.
[build]
  publish = "."
  command = ""

# Mismas cabeceras de seguridad que en Helios (HTTPS lo da Netlify de serie).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
